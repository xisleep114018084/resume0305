<!DOCTYPE html>

<head>

<title>履歷 - 側邊欄版型</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:"Segoe UI","Microsoft JhengHei",sans-serif;}
body{background:#eef2f7;color:#333;}
.container{display:grid;grid-template-columns:280px 1fr;max-width:1000px;margin:30px auto;background:#fff;border-radius:12px;overflow:hidden;box-shadow:0 8px 25px rgba(0,0,0,0.1);} 
.sidebar{background:#1e2a38;color:#fff;padding:30px;text-align:center;}
.sidebar img{width:120px;height:120px;border-radius:50%;object-fit:cover;margin-bottom:15px;border:4px solid #fff;}
.sidebar h1{font-size:1.8rem;margin-bottom:10px;}
.sidebar p{font-size:0.9rem;margin:5px 0;color:#ccc;}
.sidebar .section{margin-top:25px;text-align:left;}
.sidebar h3{font-size:1rem;margin-bottom:10px;border-bottom:1px solid rgba(255,255,255,0.3);padding-bottom:5px;}
.sidebar .tag{display:inline-block;background:#2f3e50;padding:5px 10px;margin:5px;border-radius:20px;font-size:0.8rem;}
.main{padding:30px;}
.section{margin-bottom:25px;}
.section h2{color:#1e2a38;margin-bottom:10px;border-left:4px solid #1e2a38;padding-left:10px;}
.item{margin-bottom:15px;}
.item-title{font-weight:bold;margin-bottom:5px;}
.item p{font-size:0.95rem;color:#555;}
button{margin-top:20px;padding:10px 20px;border:none;background:#ff9800;color:#fff;border-radius:6px;cursor:pointer;}
.music-btn{position:fixed;bottom:20px;right:20px;background:#1e2a38;color:#fff;border:none;padding:12px 18px;border-radius:50px;font-size:14px;box-shadow:0 4px 10px rgba(0,0,0,0.2);cursor:pointer;}
</style>
</head>
<body>

<!-- 音樂 -->
<audio id="bgm" loop>
  <source src="無版權背景音樂｜輕快｜歡樂｜夏日活力的 YouTube 免費BGM - Declan DP (youtube).mp3" type="audio/mpeg">
</audio>

<div class="container">

<div class="sidebar">
<img src="photos/小老鼠.png" alt="照片">

<p>AU114018084</p>
<p>AU114018084@asia.edu.tw</p>
<p>台中市霧峰區</p>

<div class="section">

<button onclick="window.print()">列印 / PDF</button>

</div>

<button class="music-btn" onclick="toggleMusic()" id="musicBtn">▶ 播放音樂</button>

<script>
const bgm = document.getElementById("bgm");
const btn = document.getElementById("musicBtn");

function toggleMusic(){
    if(bgm.paused){
        bgm.play().then(()=>{
            btn.innerText = "⏸ 暫停音樂";
        }).catch(err=>{
            alert("播放失敗：" + err);
        });
    }else{
        bgm.pause();
        btn.innerText = "▶ 播放音樂";
    }
}
</script>

</body>
